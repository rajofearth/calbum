name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            triple: x86_64-w64-mingw32
            out_name: calbum-x64.exe
          - arch: arm64
            triple: aarch64-w64-mingw32
            out_name: calbum-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (llvm-mingw)
        shell: pwsh
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20260602/llvm-mingw-20260602-ucrt-x86_64.zip"
          $archive = Join-Path $env:RUNNER_TEMP "llvm-mingw.zip"
          Write-Host "Downloading llvm-mingw ..."
          Invoke-WebRequest -Uri $url -OutFile $archive
          $extractDir = Join-Path $env:RUNNER_TEMP "llvm-mingw"
          Write-Host "Extracting ..."
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force
          $binDir = Join-Path $extractDir "llvm-mingw-20260602-ucrt-x86_64" "bin"
          Write-Host "Adding $binDir to PATH"
          echo "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release (${{ matrix.arch }})
        run: make release CC=${{ matrix.triple }}-gcc TARGET=${{ matrix.out_name }}
        shell: sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: ${{ matrix.out_name }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: tag
        run: |
          TAG_NAME="${{ github.ref_name || inputs.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v$(cat VERSION)"
          fi
          echo "name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download x64 build
        uses: actions/download-artifact@v4
        with:
          name: calbum-x64.exe
          path: release-artifacts/

      - name: Download arm64 build
        uses: actions/download-artifact@v4
        with:
          name: calbum-arm64.exe
          path: release-artifacts/

      - name: Generate release notes
        shell: bash
        run: |
          cat > release-notes.md <<- EOF
          # calbum ${{ steps.tag.outputs.name }}

          > _Edit this draft before publishing. Replace placeholders below._

          ## Downloads

          | File | Platform |
          |------|----------|
          | calbum-x64.exe | 64-bit Intel/AMD Windows |
          | calbum-arm64.exe | 64-bit ARM Windows |

          > **Note:** This is a portable, unsigned executable. Windows SmartScreen / Defender may display an "unrecognized publisher" warning. To dismiss it, click **More info** → **Run anyway**.

          ---

          ## Features

          _(Summarise what's new in this release.)_

          ## Known Issues

          _(List any known issues.)_

          ---

          ## Changelog

          ### ${{ steps.tag.outputs.name }} ($(date +%Y-%m-%d))

          - _(Describe changes since the previous release)_

          ---
          EOF

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --draft \
            --title "${{ steps.tag.outputs.name }}" \
            --notes-file release-notes.md \
            release-artifacts/*
