name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            triple: x86_64-w64-mingw32
            mingw_archive: x86_64-15.2.0-release-posix-seh-ucrt-rt_v13-rev0.7z
            out_name: calbum-x64.exe
          - arch: arm64
            triple: aarch64-w64-mingw32
            mingw_archive: aarch64-15.2.0-release-posix-seh-ucrt-rt_v13-rev0.7z
            out_name: calbum-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (${{ matrix.arch }})
        shell: pwsh
        run: |
          $url = "https://github.com/niXman/mingw-builds-binaries/releases/download/15.2.0-rt_v13-rev0/${{ matrix.mingw_archive }}"
          $archive = Join-Path $env:RUNNER_TEMP "${{ matrix.mingw_archive }}"
          Write-Host "Downloading MinGW ${{ matrix.arch }} ..."
          Invoke-WebRequest -Uri $url -OutFile $archive
          $extractDir = Join-Path $env:RUNNER_TEMP "mingw-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          7z x $archive -o"$extractDir" -y | Out-Null
          $binDir = Join-Path $extractDir "mingw64" "bin"
          echo "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release (${{ matrix.arch }})
        env:
          # Use tag name from tag push, or fall back to manual dispatch input
          TAG: ${{ github.ref_name || inputs.tag_name }}
        run: >
          ${{ matrix.triple }}-gcc build.c -o ${{ matrix.out_name }}
          -DAPP_VERSION='"${TAG#v}"'
          -DAPP_VERSION_W='L"${TAG#v}"'
          -mwindows -std=c17 -O2 -Wall -Wextra
          -lgdi32 -lshell32 -luser32 -lkernel32 -lole32 -luuid -ld3d11 -ldxguid
          -lwindowscodecs -ld3dcompiler -ldwmapi -ld2d1 -ldwrite
        shell: sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: ${{ matrix.out_name }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ github.ref_name || inputs.tag_name }}" >> $GITHUB_OUTPUT

      - name: Download x64 build
        uses: actions/download-artifact@v4
        with:
          name: calbum-x64.exe
          path: release-artifacts/

      - name: Download arm64 build
        uses: actions/download-artifact@v4
        with:
          name: calbum-arm64.exe
          path: release-artifacts/

      - name: Generate release notes
        shell: bash
        run: |
          cat > release-notes.md <<- EOF
          ## calbum ${{ steps.tag.outputs.name }}

          ### Downloads
          - **calbum-x64.exe** — 64-bit Intel/AMD Windows
          - **calbum-arm64.exe** — 64-bit ARM Windows (Surface Pro X, etc.)

          ### Changelog
          _(Insert release notes here)_
          EOF

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --draft \
            --title "${{ steps.tag.outputs.name }}" \
            --notes-file release-notes.md \
            release-artifacts/*
