name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            triple: x86_64-w64-mingw32
            out_name: calbum-x64.exe
            out_name_debug: calbum-x64-debug.exe
          - arch: arm64
            triple: aarch64-w64-mingw32
            out_name: calbum-arm64.exe
            out_name_debug: calbum-arm64-debug.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (llvm-mingw)
        shell: pwsh
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20260602/llvm-mingw-20260602-ucrt-x86_64.zip"
          $archive = Join-Path $env:RUNNER_TEMP "llvm-mingw.zip"
          Write-Host "Downloading llvm-mingw ..."
          Invoke-WebRequest -Uri $url -OutFile $archive
          $extractDir = Join-Path $env:RUNNER_TEMP "llvm-mingw"
          Write-Host "Extracting ..."
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force
          $binDir = Join-Path $extractDir "llvm-mingw-20260602-ucrt-x86_64" "bin"
          Write-Host "Adding $binDir to PATH"
          echo "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify compiler
        run: ${{ matrix.triple }}-gcc --version

      - name: Build release (${{ matrix.arch }})
        run: >
          ${{ matrix.triple }}-gcc build.c -o ${{ matrix.out_name }}
          -mwindows -std=c17 -O2 -Wall -Wextra
          -lgdi32 -lshell32 -luser32 -lkernel32 -lole32 -luuid -ld3d11 -ldxguid
          -lwindowscodecs -ld3dcompiler -ldwmapi -ld2d1 -ldwrite
        shell: sh

      - name: Build debug (${{ matrix.arch }})
        run: >
          ${{ matrix.triple }}-gcc build.c -o ${{ matrix.out_name_debug }}
          -mwindows -std=c17 -O0 -g -Wall -Wextra -Wpedantic
          -lgdi32 -lshell32 -luser32 -lkernel32 -lole32 -luuid -ld3d11 -ldxguid
          -lwindowscodecs -ld3dcompiler -ldwmapi -ld2d1 -ldwrite
        shell: sh

      - name: Build tests
        if: matrix.arch == 'x64'
        run: |
          mkdir -p tests/build
          ${{ matrix.triple }}-gcc tests/test_main.c -o tests/build/test_runner \
            -g -O0 -Wall -Wextra -std=c17 \
            -lgdi32 -lshell32 -lshlwapi -luser32 -lkernel32 -lole32 -luuid \
            -ld3d11 -ldxguid -lwindowscodecs -ld3dcompiler -ldwmapi -ld2d1 -ldwrite \
            -I.
        shell: sh

      - name: Run tests
        if: matrix.arch == 'x64'
        run: ./tests/build/test_runner
        shell: sh

      - name: Check binary size
        run: |
          echo "Release binary size (${{ matrix.arch }}):"
          ls -lh ${{ matrix.out_name }}
        shell: sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calbum-${{ matrix.arch }}
          path: |
            ${{ matrix.out_name }}
            ${{ matrix.out_name_debug }}
